kind = "web"
previewPath = "/"
title = "Margie’s Barge Report"
version = "1.0.0"
id = "artifacts/margies-barge-report"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23715

[services.development]
run = "pnpm --filter @workspace/margies-barge-report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/margies-barge-report", "run", "build" ]
publicDir = "artifacts/margies-barge-report/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23715"
BASE_PATH = "/"
